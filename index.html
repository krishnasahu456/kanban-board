<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KANBAN BOARD</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>
  <main>
    <!-- for the header. -->
    <nav class="heading">
      <div class="left">Kanban</div>
      <div class="right"> <button id="toggle-modal"> Add new Task</button></div>
    </nav>  
  <section class="board">

      <div id="todo" class="task-column">
       <div class="heading">
        <div class="left">To Do</div>
        <div class="right">Count</div>
       </div>
       
       <!-- making the task draggable  -->
       <!-- <div draggable="true" class="task">
        <h2>Task-1</h2>
        <p>Description of task 1</p>
        <button>Delete</button>
       </div> -->
      </div>


      <div id="progress" class="task-column ">
       <div class="heading">
        <div class="left">In Progress</div>
        <div class="right">Count</div>
       </div>
      </div>


     <div id="done" class="task-column">
       <div class="heading">
        <div class="left">Done</div>
        <div class="right">Count</div>
       </div>
      </div>

  </section>

  </main>
  <div class="modal  add-new-task">
    <div class="bg"></div>
    <div class="center">
      <input type="text" id ="task-title-input" placeholder="Task Title">
      <textarea id="task-desc-input"  placeholder="Task Description"></textarea>
 
      <button  class="add-task-btn" id="add-new-task"> Add Task</button>

    </div>
    

  </div>

  <script src="script.js"></script>

  
</body>
</html>
